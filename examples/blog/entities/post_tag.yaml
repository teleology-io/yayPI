version: "1"
kind: entity
entity:
  name: PostTag
  table: post_tags
  timestamps: false
  fields:
    - name: post_id
      type: uuid
      nullable: false
      references:
        entity: Post
        field: id
        on_delete: CASCADE
        on_update: NO ACTION
    - name: tag_id
      type: uuid
      nullable: false
      references:
        entity: Tag
        field: id
        on_delete: CASCADE
        on_update: NO ACTION
  constraints:
    - name: pk_post_tags
      type: primary_key
      columns: [post_id, tag_id]
  indexes:
    - name: idx_post_tags_tag_id
      columns: [tag_id]
