version: "1"
kind: entity
entity:
  name: User
  table: users
  timestamps: true
  soft_delete: true
  fields:
    - name: id
      type: uuid
      primary_key: true
      default: gen_random_uuid()
    - name: email
      type: string
      length: 255
      unique: true
      nullable: false
    - name: username
      type: string
      length: 64
      unique: true
      nullable: false
    - name: password_hash
      type: string
      length: 255
      nullable: false
      serialization:
        omit_response: true
        omit_log: true
    - name: role
      type: string
      length: 32
      default: "'viewer'"
    - name: bio
      type: text
      nullable: true
  indexes:
    - name: idx_users_email
      columns: [email]
      unique: true
    - name: idx_users_username
      columns: [username]
      unique: true
