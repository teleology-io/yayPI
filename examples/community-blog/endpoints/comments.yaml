version: "1"
kind: endpoints

endpoints:
  # Collection: GET /comments, POST /comments
  #
  # Fetch comments for a post:   GET /comments?post_id=<uuid>
  # Fetch replies to a comment:  GET /comments?parent_id=<uuid>
  # Fetch comments by author:    GET /comments?author_id=<uuid>
  #
  - path: /comments
    entity: Comment
    crud: [list, create]

    list:
      allow_filter_by: [post_id, author_id, parent_id]
      allow_sort_by: [created_at]
      default_sort: created_at:asc
      pagination:
        style: cursor
        default_limit: 50
        max_limit: 200
      include: [author]
      auth:
        require: false   # public read
      # No row_access here — all comments are publicly visible.
      # Soft-deleted comments are automatically excluded by the soft_delete filter.

    create:
      auth:
        require: true
        roles: [member, editor, admin]   # any authenticated user can comment

  # Item: GET /comment/{id}, PATCH /comment/{id}, DELETE /comment/{id}
  - path: /comment/{id}
    entity: Comment
    crud: [get, update, delete]

    get:
      include: [author]
      auth:
        require: false

    update:
      allowed_fields: [body, edited, flagged]
      auth:
        require: true
        roles: [member, editor, admin]
      # Authors can edit their own comments; admins can edit any.
      # The "flagged" field is restricted at the entity level (write_roles: [admin]),
      # so even if a member passes it in the request body it is silently ignored.
      row_access:
        - when: "subject.role == \"admin\""
          filter: ""
        - when: "*"
          filter: "author_id = :subject.id"

    delete:
      soft_delete: true
      auth:
        require: true
        roles: [member, editor, admin]
      # Authors can delete their own comments; admins can delete any.
      row_access:
        - when: "subject.role == \"admin\""
          filter: ""
        - when: "*"
          filter: "author_id = :subject.id"
