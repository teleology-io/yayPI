version: "1"
kind: auth

auth:
  base_path: /auth

  # Extend the built-in User with app-specific fields.
  # Built-in fields (id, email, password_hash, role, oauth_provider, oauth_id,
  # created_at, updated_at, deleted_at) are always present and cannot be overridden.
  user:
    fields:
      - name: username
        type: string
        length: 64
        unique: true
        nullable: false

      - name: display_name
        type: string
        length: 128
        nullable: true

      - name: bio
        type: text
        nullable: true

      - name: avatar_url
        type: string
        length: 512
        nullable: true

  register:
    enabled: true
    default_role: member

  login:
    enabled: true

  me:
    enabled: true   # GET /auth/me — returns the current user

  # OAuth2 providers — uncomment and configure as needed
  #
  # oauth2:
  #   providers:
  #     - name: google
  #       client_id: ${GOOGLE_CLIENT_ID}
  #       client_secret: ${GOOGLE_CLIENT_SECRET}
  #       redirect_uri: ${APP_URL:-http://localhost:8080}/api/v1/auth/callback/google
  #       success_redirect: ${APP_URL:-http://localhost:3000}
  #       error_redirect: ${APP_URL:-http://localhost:3000}/login
  #
  #     - name: github
  #       client_id: ${GITHUB_CLIENT_ID}
  #       client_secret: ${GITHUB_CLIENT_SECRET}
  #       redirect_uri: ${APP_URL:-http://localhost:8080}/api/v1/auth/callback/github
  #       success_redirect: ${APP_URL:-http://localhost:3000}
  #       error_redirect: ${APP_URL:-http://localhost:3000}/login
