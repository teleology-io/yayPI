version: "1"
kind: auth

auth:
  base_path: /auth
  user_entity: User

  register:
    enabled: true
    credential_field: email     # field used as the login identifier
    password_field: password    # field sent in the request body (never stored)
    hash_field: password_hash   # entity field where the bcrypt hash is stored
    default_role: member        # role assigned to new registrations

  login:
    enabled: true
    credential_field: email
    password_field: password
    hash_field: password_hash

  me:
    enabled: true               # GET /auth/me — returns the current user

